[pytest]
# pytest configuration for the DFR application test suite

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Minimum Python version
minversion = 3.8

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for test categorization
markers =
    unit: Unit tests for individual functions
    integration: Integration tests across modules
    slow: Tests that take longer to run
    coverage: Coverage analysis related tests
    search: Search utility tests
    propagation: RF propagation tests
    export: Export handler tests
    stations: Station generation tests

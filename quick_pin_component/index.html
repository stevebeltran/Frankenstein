<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }
    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    const ComponentMessageType = {
      COMPONENT_READY: "streamlit:componentReady",
      SET_COMPONENT_VALUE: "streamlit:setComponentValue",
      SET_FRAME_HEIGHT: "streamlit:setFrameHeight",
    };
    const StreamlitRenderMessage = "streamlit:render";
    const plotEl = document.getElementById("map");
    let boundCanvas = null;
    let pointerState = { downX: 0, downY: 0, moved: false };

    function sendMessage(type, data) {
      window.parent.postMessage(Object.assign({
        isStreamlitMessage: true,
        type: type,
      }, data || {}), "*");
    }

    function setFrameHeight(height) {
      sendMessage(ComponentMessageType.SET_FRAME_HEIGHT, { height: height });
    }

    function setComponentValue(value) {
      sendMessage(ComponentMessageType.SET_COMPONENT_VALUE, {
        value: value,
        dataType: "json",
      });
    }

    function getMapInstance() {
      const candidates = [
        plotEl && plotEl._fullLayout && plotEl._fullLayout.map && plotEl._fullLayout.map._subplot && plotEl._fullLayout.map._subplot.map,
        plotEl && plotEl._fullLayout && plotEl._fullLayout.mapbox && plotEl._fullLayout.mapbox._subplot && plotEl._fullLayout.mapbox._subplot.map,
        plotEl && plotEl._fullLayout && plotEl._fullLayout._subplots && plotEl._fullLayout._subplots.map && plotEl._fullLayout._subplots.map[0],
      ];
      for (const candidate of candidates) {
        if (candidate && typeof candidate.unproject === "function") {
          return candidate;
        }
      }
      return null;
    }

    function installClickCapture() {
      const mapCanvas = plotEl.querySelector(".mapboxgl-canvas, .maplibregl-canvas, canvas");
      if (!mapCanvas || boundCanvas === mapCanvas) {
        if (mapCanvas) {
          mapCanvas.style.cursor = "crosshair";
          plotEl.style.cursor = "crosshair";
        }
        return;
      }
      boundCanvas = mapCanvas;
      mapCanvas.style.cursor = "crosshair";
      plotEl.style.cursor = "crosshair";

      mapCanvas.addEventListener("pointerdown", (evt) => {
        pointerState = { downX: evt.clientX, downY: evt.clientY, moved: false };
      });
      mapCanvas.addEventListener("pointermove", (evt) => {
        if (Math.abs(evt.clientX - pointerState.downX) > 5 || Math.abs(evt.clientY - pointerState.downY) > 5) {
          pointerState.moved = true;
        }
      });
      mapCanvas.addEventListener("click", (evt) => {
        if (pointerState.moved) {
          pointerState = { downX: 0, downY: 0, moved: false };
          return;
        }
        const mapInstance = getMapInstance();
        if (!mapInstance) {
          return;
        }
        const rect = mapCanvas.getBoundingClientRect();
        const point = mapInstance.unproject([evt.clientX - rect.left, evt.clientY - rect.top]);
        const lat = Number(point && (point.lat !== undefined ? point.lat : point.y));
        const lon = Number(point && (point.lng !== undefined ? point.lng : point.lon !== undefined ? point.lon : point.x));
        if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
          return;
        }
        setComponentValue({
          lat: lat,
          lon: lon,
          nonce: Date.now(),
        });
      });
    }

    function render(args) {
      const fig = args.figure_json || { data: [], layout: {} };
      const height = Number(args.height || 800);
      fig.layout = fig.layout || {};
      fig.layout.dragmode = "pan";
      fig.layout.clickmode = "none";
      Plotly.newPlot(plotEl, fig.data || [], fig.layout, {
        displayModeBar: false,
        scrollZoom: true,
        responsive: true,
      }).then(() => {
        installClickCapture();
        setFrameHeight(height);
      });
    }

    window.addEventListener("message", (event) => {
      if (!event.data || event.data.type !== StreamlitRenderMessage) return;
      render(event.data.args || {});
    });

    sendMessage(ComponentMessageType.COMPONENT_READY, { apiVersion: 1 });
    setFrameHeight(800);
  </script>
</body>
</html>
